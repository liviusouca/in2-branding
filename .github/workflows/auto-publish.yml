name: Auto-publish (poll Sanity → deploy on change)

# Every 5 minutes: check if Sanity content is newer than the last Cloudflare
# deployment. If so, rebuild from Sanity and deploy. No webhook needed.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: auto-publish
  cancel-in-progress: false

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new Sanity content
        id: check
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          Q='*[]|order(_updatedAt desc)[0]._updatedAt'
          # Tolerate transient non-JSON / empty API responses: jq parse errors
          # are swallowed (|| true) so a momentary hiccup doesn't fail the run.
          SAN=$(curl -s --max-time 30 -H "Authorization: Bearer $SANITY_AUTH_TOKEN" \
            --get "https://${SANITY_PROJECT_ID}.api.sanity.io/v2021-06-07/data/query/production" \
            --data-urlencode "query=$Q" | jq -r '.result // empty' 2>/dev/null || true)
          DEP=$(curl -s --max-time 30 -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/in2branding/deployments?per_page=1" \
            | jq -r '.result[0].created_on // empty' 2>/dev/null || true)
          echo "Sanity latest:   ${SAN:-<none>}"
          echo "Last deployment: ${DEP:-<none>}"
          # If either API didn't return usable data, treat it as a transient
          # blip and skip this cycle instead of erroring out. The next run
          # (5 min later) will retry. For a first-ever deploy use workflow_dispatch.
          if [ -z "$SAN" ]; then echo "→ no Sanity data (transient); skipping"; echo "changed=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ -z "$DEP" ]; then echo "→ no deployment data (transient); skipping"; echo "changed=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "$SAN" \> "$DEP" ]; then
            echo "→ content changed, will deploy"; echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "→ no change, skipping"; echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.changed == 'true'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: 20
          cache: npm
      - name: Install
        if: steps.check.outputs.changed == 'true'
        run: npm ci
      - name: Build from Sanity
        if: steps.check.outputs.changed == 'true'
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: npm run build
      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=in2branding --branch=main --commit-dirty=true
